{% extends "base.html" %} {% block title %}Admin - Interview Setup{% endblock %}
{% block content %}
<div class="form-container" style="max-width: 700px">
  <div style="text-align: center; margin-bottom: 40px; position: relative">
    <div style="font-size: 48px; margin-bottom: 15px">👨‍💼</div>
    <h1
      style="
        font-size: 28px;
        font-weight: 700;
        color: #333;
        margin-bottom: 10px;
      "
    >
      Interview Setup
    </h1>
    <p style="font-size: 14px; color: #666">
      Configure the interview parameters
    </p>
    <a
      href="{{ url_for('admin_login') }}"
      class="logout-btn"
      style="
        position: absolute;
        top: 0;
        right: 0;
        padding: 8px 16px;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        color: #333;
        cursor: pointer;
      "
      >Logout</a
    >
  </div>

  <div id="alert-container"></div>

  <form id="adminForm" method="POST" action="{{ url_for('admin_setup') }}">
    <div style="margin-bottom: 24px">
      <label class="form-label">Job Title *</label>
      <input
        type="text"
        id="jobTitle"
        name="jobTitle"
        class="form-input"
        placeholder="e.g., Senior Software Engineer"
        required
      />
    </div>

    <div style="margin-bottom: 24px">
      <label class="form-label">Job Description *</label>
      <textarea
        id="jobDescription"
        name="jobDescription"
        class="form-textarea"
        placeholder="Enter detailed job description..."
        required
      ></textarea>
    </div>

    <div style="margin-bottom: 24px">
      <label class="form-label">Required Skills *</label>
      <textarea
        id="requiredSkills"
        name="requiredSkills"
        class="form-textarea"
        placeholder="Enter skills separated by commas (e.g., JavaScript, React, Node.js)"
        required
      ></textarea>
    </div>

    <div style="margin-bottom: 24px">
      <label class="form-label">Experience Level *</label>
      <select
        id="experienceLevel"
        name="experienceLevel"
        class="form-input"
        required
      >
        <option value="">Select experience level</option>
        <option value="junior">Junior (0-2 years)</option>
        <option value="mid">Mid-level (2-5 years)</option>
        <option value="senior">Senior (5+ years)</option>
      </select>
    </div>

    <div style="margin-bottom: 24px">
      <label class="form-label">Interviewer Mode *</label>
      <select
        id="interviewerMode"
        name="interviewerMode"
        class="form-input"
        required
      >
        <option value="">Select mode</option>
        <option value="friendly">Friendly & Supportive</option>
        <option value="neutral">Neutral & Professional</option>
      </select>
    </div>

    <div style="margin-bottom: 30px">
      <label class="form-label">Target Number of Questions *</label>
      <input
        type="number"
        id="numberOfQuestions"
        name="numberOfQuestions"
        class="form-input"
        min="5"
        max="30"
        value="15"
        required
      />
    </div>

    <div style="display: flex; gap: 12px">
      <button type="submit" class="btn btn-primary" style="flex: 1">
        Proceed to Candidate Details →
      </button>
      <button
        type="reset"
        class="btn"
        style="
          flex: 1;
          background: #f3f4f6;
          color: #333;
          border: 2px solid #e5e7eb;
        "
      >
        Clear
      </button>
    </div>
  </form>
</div>
{% endblock %}
