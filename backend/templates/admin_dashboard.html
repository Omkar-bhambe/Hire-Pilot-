<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f5f7fb;
      }

      .navbar {
        background: #667eea;
        color: white;
        padding: 15px 20px;
        font-size: 20px;
        display: flex;
        justify-content: space-between;
      }

      .container {
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
      }

      button {
        padding: 10px 15px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #5a67d8;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }

      th {
        background: #667eea;
        color: white;
      }

      .modal {
        display: none;
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
      }

      .modal-content {
        background: white;
        padding: 20px;
        margin: 5% auto;
        width: 50%;
        border-radius: 10px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      🎯 Admin Dashboard
      <span onclick="logout()" style="cursor: pointer">Logout</span>
    </div>

    <div class="container">
      <!-- ================= CREATE ================= -->
      <div class="card">
        <h3>➕ Schedule Interview</h3>

        <input id="name" placeholder="Candidate Name" />
        <input id="email" placeholder="Email" />

        <label>📅 Date</label>
        <input type="date" id="date" />

        <label>⏰ Time</label>
        <input type="time" id="time" />

        <textarea id="jd" placeholder="Job Description"></textarea>

        <label>📄 Upload Resume</label>
        <input type="file" id="resumeFile" />

        <button onclick="createInterview()">Schedule Interview</button>
      </div>

      <!-- ================= TABLE ================= -->
      <div class="card">
        <h3>📊 All Interviews</h3>

        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Status</th>
              <th>Result</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ================= MODAL ================= -->
    <div class="modal" id="modal">
      <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
      const token = localStorage.getItem("token");
      if (!token) window.location.href = "/";

      // ================= FORMAT DATE =================
      function formatDate(dateStr, timeStr) {
        const d = new Date(dateStr + "T" + timeStr);
        return d.toLocaleString("en-IN", {
          dateStyle: "medium",
          timeStyle: "short",
        });
      }

      // ================= CREATE =================
      async function createInterview() {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const jd = document.getElementById("jd").value;
        const file = document.getElementById("resumeFile").files[0];
        const date = document.getElementById("date").value;
        const time = document.getElementById("time").value;

        if (!name || !email || !jd || !file || !date || !time) {
          alert("❗ Please fill all fields");
          return;
        }

        const schedule = formatDate(date, time);

        const formData = new FormData();

        // 🔥 FIXED (IMPORTANT)
        formData.append("name", name);
        formData.append("email", email);
        formData.append("job_description", jd);
        formData.append("schedule_time", schedule);
        formData.append("resume", file);

        try {
          const res = await fetch("/api/admin/create-interview", {
            method: "POST",
            headers: {
              Authorization: "Bearer " + token,
            },
            body: formData,
          });

          const data = await res.json();

          if (data.status === "success") {
            alert("✅ Interview Scheduled Successfully");
            loadInterviews();
          } else {
            alert("❌ " + (data.error || "Failed"));
          }
        } catch (err) {
          alert("❌ Server error");
          console.log(err);
        }
      }

      // ================= LOAD =================
      async function loadInterviews() {
        const res = await fetch("/api/admin/interviews", {
          headers: {
            Authorization: "Bearer " + token,
          },
        });

        const data = await res.json();

        let html = "";

        data.data.forEach((i) => {
          html += `
    <tr>
      <td>${i.name || "-"}</td>
      <td>${i.email || "-"}</td>
      <td>${i.status || "-"}</td>
      <td>${i.final_result || "Pending"}</td>
      <td>
        <button onclick="viewDetails('${i.id}')">View</button>
      </td>
    </tr>
    `;
        });

        document.getElementById("tableBody").innerHTML = html;
      }

      // ================= VIEW =================
      function viewDetails(id) {
        fetch(`/api/admin/interview/${id}`, {
          headers: {
            Authorization: "Bearer " + token,
          },
        })
          .then((res) => res.json())
          .then((data) => {
            const i = data.data;

            document.getElementById("modalContent").innerHTML = `
      <h2>${i.name}</h2>
      <p>Email: ${i.email}</p>
      <p>Status: ${i.status}</p>

      <h3>Final Result</h3>
      <h2>${i.final_result || "Pending"}</h2>

      <button onclick="closeModal()">Close</button>
    `;

            document.getElementById("modal").style.display = "block";
          });
      }

      // ================= CLOSE =================
      function closeModal() {
        document.getElementById("modal").style.display = "none";
      }

      // ================= LOGOUT =================
      function logout() {
        localStorage.removeItem("token");
        window.location.href = "/";
      }

      // ================= INIT =================
      loadInterviews();
    </script>
  </body>
</html>
