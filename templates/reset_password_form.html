<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HirePilot | Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center p-6 font-['Plus_Jakarta_Sans']">
    <div class="relative w-full max-w-md bg-white p-10 rounded-[40px] shadow-2xl border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter">Reset Password<span class="text-indigo-600">.</span></h1>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-2">Enter your new credentials</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">New Password</label>
                <input type="password" name="password" placeholder="••••••••" required
                       class="w-full p-4 rounded-2xl bg-slate-50 border-none text-sm font-semibold focus:ring-2 focus:ring-indigo-500 transition">
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white font-black py-5 rounded-3xl hover:bg-indigo-600 transition shadow-xl transform active:scale-95">
                Update Password 🔐
            </button>
        </form>
    </div>
</body>
</html>
