<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HirePilot | Start New Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }</style>
</head>
<body class="p-12">
    <div class="max-w-3xl mx-auto">
        <header class="mb-12">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">Create Recruitment Drive</h1>
            <p class="text-slate-500 font-medium mt-2 text-lg">Initialize a new isolated environment for your hiring session.</p>
        </header>

        <form action="/api/create-session" method="POST" enctype="multipart/form-data" class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-xl">
            <div class="grid grid-cols-2 gap-6 mb-8">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Drive Name</label>
                    <input type="text" name="session_name" placeholder="e.g., Google SDE-1" required 
                           class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none font-bold transition">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Batch/Year</label>
                    <input type="number" name="year" value="2026" required 
                           class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none font-bold transition">
                </div>
            </div>

            <div class="space-y-4 mb-8">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Job Description</label>
                    <select id="jd_type" onchange="toggleJD()" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg outline-none">
                        <option value="text">Paste Prompt</option>
                        <option value="file">Upload Document</option>
                    </select>
                </div>

                <div id="jd_text_area">
                    <textarea name="jd_text" placeholder="Paste the job requirements here..." 
                              class="w-full h-48 bg-slate-50 p-6 rounded-3xl border-2 border-transparent focus:border-indigo-500 outline-none text-sm leading-relaxed transition"></textarea>
                </div>

                <div id="jd_file_area" class="hidden">
                    <input type="file" name="jd_file" class="w-full bg-slate-50 p-10 rounded-3xl border-2 border-dashed border-slate-200 text-center font-bold text-slate-400">
                </div>
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-indigo-600 transition shadow-lg shadow-indigo-100">
                Launch Drive Center
            </button>
        </form>
    </div>

    <script>
        function toggleJD() {
            const type = document.getElementById('jd_type').value;
            document.getElementById('jd_text_area').classList.toggle('hidden', type === 'file');
            document.getElementById('jd_file_area').classList.toggle('hidden', type === 'text');
        }
    </script>
</body>
</html>
