<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HirePilot | AI Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .landscape-max { max-width: 1200px; }
        /* Technique to keep PDF content "visible" to the engine but hidden from user */
        #pdf-render-zone {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 800px; /* Standard A4 width */
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="landscape-max mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold text-slate-900">HirePilot<span class="text-indigo-600">.</span></h1>
                <p class="text-slate-500">Agentic AI Recruitment Analysis</p>
            </div>
            <button onclick="location.href='/'" class="text-sm font-bold text-slate-400 hover:text-indigo-600 transition">
                ← Back to Gateway
            </button>
        </header>

        <main class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <form id="analysis-form" class="flex flex-col lg:flex-row">
                <div class="lg:w-1/2 p-8 bg-slate-50/50 border-b lg:border-b-0 lg:border-r border-slate-100">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-4">1. Define Requirements</label>
                    <textarea name="job_description" rows="12" class="w-full p-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition text-sm" placeholder="Paste Job Description here..." required></textarea>
                </div>

                <div class="lg:w-1/2 p-8 flex flex-col justify-between">
                    <div>
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-4">2. Candidate Data</label>
                        <div class="border-2 border-dashed border-slate-200 rounded-2xl p-10 text-center hover:bg-indigo-50 hover:border-indigo-400 transition cursor-pointer relative">
                            <input type="file" name="resume" id="resume-input" class="absolute inset-0 opacity-0 cursor-pointer" required>
                            <div class="space-y-3">
                                <div class="text-3xl">📂</div>
                                <p class="text-sm font-bold text-slate-700">Click to upload Resume</p>
                                <p id="file-display" class="text-indigo-600 font-medium text-xs"></p>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition transform active:scale-95 mt-8">
                        Execute One-Tap AI Matching
                    </button>
                </div>
            </form>
        </main>

        <div id="status-container" class="mt-10 max-w-lg mx-auto hidden">
            <div id="loading-state" class="text-center p-8 bg-white rounded-2xl shadow-sm border">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent mb-4"></div>
                <p class="text-slate-600 font-bold">Gemini is analyzing records... </p>
            </div>

            <div id="complete-state" class="hidden text-center p-8 bg-indigo-600 rounded-2xl shadow-2xl text-white">
                <div class="text-4xl mb-3">⭐</div>
                <h3 class="text-xl font-bold mb-1">Analysis Complete</h3>
                <p class="text-indigo-100 text-sm mb-6">Candidate analysis has been generated and recorded.</p>
                <button onclick="generateProfessionalPDF()" class="bg-white text-indigo-600 font-black px-10 py-3 rounded-full hover:bg-indigo-50 transition">
                    Download Recruitment PDF
                </button>
            </div>
        </div>
    </div>

    <div id="pdf-render-zone">
        <div id="pdf-content" style="padding: 40px; background: white; color: #0f172a;">
            </div>
    </div>

    <script>
        let aiResult = null;

        document.getElementById('resume-input').addEventListener('change', (e) => {
            document.getElementById('file-display').innerText = e.target.files[0]?.name || '';
        });

        document.getElementById('analysis-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const statusBox = document.getElementById('status-container');
            const loading = document.getElementById('loading-state');
            const complete = document.getElementById('complete-state');

            statusBox.classList.remove('hidden');
            loading.classList.remove('hidden');
            complete.classList.add('hidden');

            try {
                const response = await fetch('/api/one-tap-process', { method: 'POST', body: formData });
                if (!response.ok) throw new Error("Processing failed");
                aiResult = await response.json();
                loading.classList.add('hidden');
                complete.classList.remove('hidden');
            } catch (err) {
                alert(err.message);
                statusBox.classList.add('hidden');
            }
        });

        function generateProfessionalPDF() {
            if (!aiResult) return;
            const container = document.getElementById('pdf-content');

            // Build structured report mirroring the web style
            container.innerHTML = `
                <div style="border-bottom: 4px solid #4f46e5; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <h1 style="font-size: 28px; font-weight: 800; color: #0f172a; margin: 0;">HirePilot<span style="color: #4f46e5;">.</span></h1>
                        <p style="color: #64748b; font-size: 12px; margin: 5px 0 0 0;">Recruitment Analysis Report</p>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-size: 10px; color: #94a3b8; margin: 0;">Report ID: ${Math.random().toString(36).substr(2, 9).toUpperCase()}</p>
                    </div>
                </div>

                <div style="margin-bottom: 40px;">
                    <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 5px;">Candidate: ${aiResult.entities.name}</h2>
                    <div style="display: flex; gap: 20px; margin-top: 15px;">
                        <div style="background: #eef2ff; padding: 15px 25px; border-radius: 12px; text-align: center;">
                            <p style="font-size: 10px; color: #4338ca; font-weight: 800; text-transform: uppercase; margin-bottom: 5px;">Match Score</p>
                            <p style="font-size: 32px; color: #4338ca; font-weight: 900; margin: 0;">${aiResult.match_score}%</p>
                        </div>
                        <div style="flex-grow: 1; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px;">
                            <p style="font-size: 12px; color: #64748b; margin: 0;"><strong>Email:</strong> ${aiResult.entities.email}</p>
                            <p style="font-size: 12px; color: #64748b; margin: 5px 0 0 0;"><strong>Experience:</strong> ${aiResult.entities.experience_years}</p>
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 30px;">
                    <h3 style="font-size: 14px; font-weight: 800; color: #1e293b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">AI Analysis Justification</h3>
                    <div style="background: #f8fafc; padding: 20px; border-radius: 16px; border-left: 4px solid #4f46e5;">
                        <p style="font-size: 13px; line-height: 1.7; color: #334155; margin: 0;">${aiResult.justification}</p>
                    </div>
                </div>

                <div style="margin-bottom: 30px;">
                    <h3 style="font-size: 14px; font-weight: 800; color: #1e293b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Extracted Skillset</h3>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        ${aiResult.entities.skills.map(skill => `<span style="background: #f1f5f9; color: #475569; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid #e2e8f0;">${skill}</span>`).join(' ')}
                    </div>
                </div>

                <div style="margin-top: 50px; border-top: 1px solid #e2e8f0; padding-top: 20px; font-size: 10px; color: #94a3b8; text-align: center;">
                    Powered by HirePilot Agentic AI | Indira College of Engineering Management
                </div>
            `;

            const opt = {
                margin: 0,
                filename: `HirePilot_Analysis_${aiResult.entities.name}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'pt', format: 'a4', orientation: 'portrait' }
            };

            // Capture the content and save
            html2pdf().set(opt).from(document.getElementById('pdf-content')).save();
        }
    </script>
</body>
</html>
