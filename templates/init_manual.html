<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HirePilot | Manual Initialization</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --hp-navy: #0f172a; --hp-blue: #2563eb; }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .form-card { border: none; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); }
        .section-header { border-left: 5px solid var(--hp-blue); padding-left: 15px; margin-bottom: 25px; }
        .form-label { font-weight: 600; color: #475569; font-size: 0.9rem; }
        .btn-execute { background: var(--hp-navy); color: white; border-radius: 12px; padding: 15px; font-weight: 700; transition: 0.3s; }
        .btn-execute:hover { background: var(--hp-blue); color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="mb-4">
                <a href="/" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left"></i> Back to Gateway</a>
            </div>

            <div class="card form-card p-4 p-md-5 bg-white">
                <div class="section-header">
                    <h2 class="fw-bold m-0">Manual Requirement Definition</h2>
                    <p class="text-muted small">Phase 0: Define strict criteria for ATS screening</p>
                </div>

                <form action="/api/process-manual" method="POST">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Job Title</label>
                            <input type="text" name="job_title" class="form-control form-control-lg bg-light border-0" placeholder="e.g. Data Scientist" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Min. Experience (Years)</label>
                            <input type="number" name="exp_years" class="form-control form-control-lg bg-light border-0" placeholder="e.g. 3">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Mandatory Technical Skills (Comma separated)</label>
                            <textarea name="skills" class="form-control bg-light border-0" rows="3" placeholder="Python, SQL, PyTorch, Azure..."></textarea>
                        </div>

                        <div class="col-md-12 mt-5">
                            <div class="p-4 rounded-4" style="background-color: #eff6ff;">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="fw-bold text-primary m-0"><i class="bi bi-cpu-fill me-2"></i>AI Shortlist Bar</h6>
                                    <span class="badge bg-primary px-3" id="scoreValue">80%</span>
                                </div>
                                <input type="range" class="form-range" min="0" max="100" value="80" id="scoreRange" oninput="document.getElementById('scoreValue').innerText = this.value + '%'">
                                <p class="small text-muted mt-2 mb-0">Candidates scoring below this will not receive an automated T1 mail.</p>
                            </div>
                        </div>

                        <div class="col-12 text-center mt-5">
                            <button type="submit" class="btn btn-execute w-100 shadow-lg">
                                Save Requirements & Proceed to Candidate Entry <i class="bi bi-chevron-right ms-2"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
