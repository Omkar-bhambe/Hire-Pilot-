<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HirePilot | Technical Assessment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; }
        .test-card { background: white; border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="test-container" class="w-full max-w-2xl test-card p-10">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-black text-slate-900">Technical Assessment<span class="text-indigo-600">.</span></h1>
            <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mt-2">HirePilot Agentic Proctoring Active</p>
        </header>

        <div id="question-box" class="space-y-6">
            <div class="flex items-center justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
                <p class="ml-4 font-bold text-slate-600">Generating questions from Job Context...</p>
            </div>
        </div>

        <button id="submit-btn" class="hidden w-full bg-slate-900 text-white font-black py-5 rounded-3xl mt-10 hover:bg-indigo-600 transition shadow-xl">
            Submit Assessment 📤
        </button>
    </div>

    <script>
        const session_id = "{{ session_id }}";
        const jd_text = `{{ jd_context }}`;
        let questions = [];

        async function initTest() {
            const res = await fetch('/api/get-questions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ jd_text: jd_text })
            });
            questions = await res.json();
            renderQuestions();
        }

        function renderQuestions() {
            const box = document.getElementById('question-box');
            box.innerHTML = questions.map((q, i) => `
                <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="font-bold text-slate-800 mb-4">${i+1}. ${q.question}</p>
                    <div class="grid grid-cols-1 gap-3">
                        ${q.options.map(opt => `
                            <label class="flex items-center p-4 bg-white rounded-xl cursor-pointer hover:border-indigo-500 border-2 border-transparent transition">
                                <input type="radio" name="q${i}" value="${opt}" class="mr-3">
                                <span class="text-sm font-medium text-slate-600">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            document.getElementById('submit-btn').classList.remove('hidden');
        }

        initTest();
    </script>
</body>
</html>
