<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HirePilot - Recover Access</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23818cf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 19l9 2-9-18-9 18 9-2zm0 0v-8' /></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        body.page-enter {
            opacity: 1;
        }
        .bg-hero {
            background-image: url('/static/background.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-hero min-h-screen flex items-center justify-center font-sans text-white overflow-hidden">

    <div class="absolute inset-0 bg-gradient-to-br from-blue-900/80 via-teal-900/70 to-blue-900/80 mix-blend-multiply"></div>

    <div class="relative z-10 w-full max-w-md p-2">

        <div class="bg-white p-10 rounded-[40px] shadow-2xl border border-white/20 backdrop-blur-sm">
            <div class="text-center mb-8">
                <div class="h-16 w-16 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center text-2xl mx-auto mb-4 shadow-inner">
                    🔐
                </div>
                <h2 class="text-2xl font-black text-slate-900 mb-2">Reset Access</h2>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Enter your HR email to receive a link</p>
            </div>

            <form action="/forgot_password" method="POST" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Official Email</label>
                    <input type="email" name="email" placeholder="email@icem.edu" required
                           class="w-full p-4 rounded-2xl bg-slate-50 border-none text-sm font-semibold text-slate-900 focus:ring-2 focus:ring-indigo-500 transition-all placeholder-slate-300">
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white font-black py-5 rounded-3xl hover:bg-indigo-600 transition shadow-xl transform active:scale-95 duration-200">
                    Send Reset Link 📩
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="{{ url_for('admin_login') }}" class="text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-indigo-600 transition-colors">
                    ← Back to Login
                </a>
            </div>
        </div>

        <p class="text-center mt-6 text-teal-100/50 text-[10px] font-bold uppercase tracking-widest">
            HirePilot Gatekeeper System v2.0
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            document.body.classList.add('page-enter');
        });
    </script>
</body>
</html>
